groups:
  - name: api-alerts
    rules:

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"4..|5.."}[1m]))
          /
          sum(rate(http_requests_total[1m])) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"

      - alert: APIDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API is down"
