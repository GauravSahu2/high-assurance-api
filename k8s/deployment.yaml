apiVersion: apps/v1
kind: Deployment
metadata:
  name: high-assurance-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hsa-api
  template:
    metadata:
      labels:
        app: hsa-api
    spec:
      containers:
      - name: api
        image: ghcr.io/gaurav/high-assurance-api:latest
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: hsa-secrets
              key: database-url
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
