apiVersion: apps/v1
kind: Deployment
metadata:
  name: high-assurance-api
  namespace: high-assurance
  annotations:
    checkov.io/skip: "CKV_K8S_35=Application requires 12-factor env vars"
  labels:
    app: high-assurance-api
    tier: backend
    compliance: pci-dss
spec:
  replicas: 3
  selector:
    matchLabels:
      app: high-assurance-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: high-assurance-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
        checkov.io/skip: "CKV_K8S_35=Application requires 12-factor env vars"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/GauravSahu2/high-assurance-api:5203533
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hsa-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hsa-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hsa-secrets
                  key: redis-url
            - name: DEPLOY_ENV
              value: "production"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: high-assurance-api
  namespace: high-assurance
  labels:
    app: high-assurance-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
  selector:
    app: high-assurance-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: high-assurance-api-pdb
  namespace: high-assurance
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: high-assurance-api
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: high-assurance-api-netpol
  namespace: high-assurance
spec:
  podSelector:
    matchLabels:
      app: high-assurance-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
      - podSelector:
          matchLabels:
            tier: frontend
      ports:
        - protocol: TCP
          port: 5000
  egress:
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
