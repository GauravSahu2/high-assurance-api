name: FOSSA Compliance & License Scan

on:
  push:
    branches: ["main"]
    paths:
      - "requirements.txt"
      - "requirements.in"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile*"
  pull_request:
    branches: ["main"]
    paths:
      - "requirements.txt"
      - "requirements.in"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ── Stage 1: Dependency Analysis ──────────────────────────────────────────
  fossa-analyze:
    name: "FOSSA — Dependency Analysis"
    runs-on: ubuntu-latest
    # Runs only when FOSSA_API_KEY is configured in repository secrets
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies (For Accurate Resolution)
        run: pip install -r requirements.txt

      - name: FOSSA Analyze — Upload Dependency Graph
        if: env.FOSSA_API_KEY != ''
        uses: fossa-contrib/fossa-action@v3
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        with:
          fossa-api-key: ${{ secrets.FOSSA_API_KEY }}

  # ── Stage 2: License Compliance Gate ──────────────────────────────────────
  fossa-test:
    name: "FOSSA — License Compliance Gate"
    runs-on: ubuntu-latest
    needs: fossa-analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: FOSSA Test — Fail Build On Policy Violation
        if: env.FOSSA_API_KEY != ''
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: |
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash
          fossa test

  # ── Stage 3: Offline License Audit (No API Key Required) ─────────────────
  license-audit-offline:
    name: "Offline License Audit (pip-licenses)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Generate License Report
        run: |
          pip install pip-licenses
          echo "## 📋 License Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pip-licenses --format=table --with-authors --order=license >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Export machine-readable formats
          pip-licenses --format=json --with-urls > license-report.json
          pip-licenses --format=csv --with-urls > license-report.csv

          # Fail on known copyleft licenses in production dependencies
          COPYLEFT=$(pip-licenses --format=json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          blocked = ['GPL', 'AGPL', 'SSPL']
          violations = [p for p in data if any(b in p.get('License','') for b in blocked)]
          if violations:
              for v in violations:
                  print(f\"⚠️  {v['Name']}=={v['Version']} → {v['License']}\")
              sys.exit(1)
          print('✅ No copyleft license violations detected')
          ")
          echo "$COPYLEFT"

      - name: Upload License Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: License-Report-${{ github.run_number }}
          path: |
            license-report.json
            license-report.csv
          retention-days: 90
