name: GitOps Image Update

on:
  push:
    branches: [ main ]

jobs:
  gitops-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Update K8s Manifest Tag
        run: |
          VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          sed -i "s|image: ghcr.io/.*:latest|image: ghcr.io/${{ github.repository }}:$VERSION|g" k8s/deployment.yaml
          git config --global user.name "GitOps Bot"
          git config --global user.email "gitops-bot@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore(gitops): update image to $VERSION"
          git push
