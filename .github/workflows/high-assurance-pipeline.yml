name: High-Assurance FDA Pipeline

on: [push, pull_request]

# Global Environment Variables
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_AUTH_TOKEN: "valid_admin_token"
  ADMIN_PASSWORD: "password123"

jobs:
  validate-tiers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo mkdir -p /usr/share/keyrings
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 || {
            echo "Keyserver failed, falling back to direct download..."
            sudo curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --import
          }
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pip-tools
          # We check if requirements.in exists before compiling
          if [ -f requirements.in ]; then
            pip-compile requirements.in -o requirements.txt
            pip install -r requirements.txt
          else
            echo "⚠️ requirements.in not found, installing direct packages..."
            pip install flask flask-cors requests pytest moto boto3 jsonschema
          fi

      - name: Install Playwright
        run: |
          npm install @playwright/test
          # --with-deps is CRITICAL for GitHub runners to install system libraries
          npx playwright install --with-deps chromium

      - name: Execute 20-Tier Orchestrator
        run: |
          chmod +x run_all_20_layers.sh
          # Verbose debugging: bash -x shows exactly where it fails
          bash -x ./run_all_20_layers.sh

      - name: Upload FDA Audit Bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Compliance-Artifacts
          path: audit_reports/
          retention-days: 30