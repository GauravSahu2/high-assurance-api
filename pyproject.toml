[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "S", "B", "UP", "N"]
ignore = ["E501"] # Ignore line length for those long HTML/Log strings

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"] # Allow asserts in test files

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = false
warn_return_any = true
ignore_missing_imports = true
