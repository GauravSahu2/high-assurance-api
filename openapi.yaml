openapi: 3.0.3
info:
  title: High-Assurance API
  version: 1.0.0
servers:
  - url: http://localhost:5000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK — API and Redis are healthy
        '503':
          description: Service degraded — Redis unreachable
  /login:
    post:
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 1
                  example: "admin"
                password:
                  type: string
                  minLength: 1
                  example: "password123"
      responses:
        '200':
          description: Token generated
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '429':
          description: Rate limited
  /transfer:
    post:
      summary: Transfer funds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  minimum: 0.000001
                  maximum: 1000.0
                  example: 100.50
      responses:
        '200':
          description: Transfer successful
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: Account not found
        '409':
          description: Duplicate transaction
  /api/users/{user_id}:
    get:
      summary: Get user role
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            example: "user_1"
      responses:
        '200':
          description: User data
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
  /api/accounts/{user_id}/balance:
    get:
      summary: Get account balance
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            example: "user_1"
      responses:
        '200':
          description: Balance data
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
