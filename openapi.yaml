openapi: "3.0.3"
info:
  title: High-Assurance API
  version: "1.0.0"
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200": { description: API is healthy }
  /login:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, minLength: 1 }
                password: { type: string, minLength: 1 }
      responses:
        "200": { description: Login successful }
        "400": { description: Invalid JSON }
        "401": { description: Invalid credentials }
        "429": { description: Account locked }
  /transfer:
    post:
      summary: Transfer funds
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number, minimum: 0.000001, maximum: 1000.0 }
      responses:
        "200": { description: Transfer successful }
        "400": { description: Invalid request }
        "401": { description: Unauthorized }
        "409": { description: Duplicate transaction }
  /api/users/{user_id}:
    get:
      summary: Get user data
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: User data }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
  /api/accounts/{user_id}/balance:
    get:
      summary: Get account balance
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Account balance }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Account not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
