openapi: 3.0.3
info:
  title: High-Assurance API
  version: 2.0.0
  description: |
    A property-tested, compliance-grade financial API with 20-tier defense-in-depth
    testing, OWASP ZAP DAST validation, and FDA 21 CFR Part 11 audit trails.

servers:
  - url: http://localhost:5000
    description: Local Development API

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /health:
    get:
      summary: Health check — verifies Redis + DB connectivity
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: All systems operational
        '503':
          description: Service degraded (infrastructure unreachable)

  /login:
    post:
      summary: Authenticate and receive a JWT token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: JWT issued successfully
        '400':
          description: Bad request — missing or invalid payload
        '401':
          description: Invalid credentials
        '429':
          description: Rate limited — too many failed attempts

  /transfer:
    post:
      summary: Execute a fund transfer with idempotency and outbox audit
      operationId: transfer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_user, amount]
              properties:
                to_user:
                  type: string
                  minLength: 1
                  example: "user_2"
                amount:
                  type: number
                  minimum: 0.000001
                  maximum: 1000.0
                  example: 50.00
      responses:
        '200':
          description: Transfer executed successfully
        '400':
          description: Bad request — invalid amount, self-transfer, or insufficient funds
        '401':
          description: Unauthorized — missing or invalid token
        '404':
          description: Account not found
        '409':
          description: Duplicate transaction (idempotency key replay)
        '500':
          description: Transaction failed

  /upload-dataset:
    post:
      summary: Upload and validate a CSV dataset (async processing)
      operationId: uploadDataset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Accepted for processing
        '400':
          description: Bad request — no file, empty, or wrong format
        '401':
          description: Unauthorized
        '422':
          description: CSV schema validation failed

  /api/users/{user_id}:
    get:
      summary: Get user profile (BOLA-protected)
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — BOLA protection
        '404':
          description: User not found

  /api/accounts/{user_id}/balance:
    get:
      summary: Get account balance (BOLA-protected)
      operationId: getBalance
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account balance
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — BOLA protection
        '404':
          description: Account not found
