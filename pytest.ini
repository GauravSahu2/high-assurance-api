[pytest]
testpaths = tests
python_files = test_*.py
pythonpath = src
addopts = --strict-markers --cov=src --cov-fail-under=100 -p no:randomly
filterwarnings =
    ignore:pythonjsonlogger.jsonlogger has been moved:DeprecationWarning
    # ── WARNING SUPPRESSION: opentelemetry-instrumentation-flask ──────────────
    # WHY: opentelemetry-instrumentation-flask 0.61b0 internally reads
    #      flask.__version__ which Flask 3.x deprecated. This is a bug in the
    #      upstream OTel library (tracked: open-telemetry/opentelemetry-python-contrib#2877).
    #      Our code never accesses flask.__version__ — the warning originates
    #      entirely inside the OTel package's own __init__.py lines 306-307.
    # IMPACT: zero — the instrumentation works correctly. Flask.__version__ still
    #         exists in Flask 3.x, it is merely deprecated for removal in 3.2+.
    #         When opentelemetry-instrumentation-flask releases a fix, remove this.
    # VERIFY: grep -r "__version__" src/ → confirms our code is clean.
    ignore:The '__version__' attribute is deprecated:DeprecationWarning:opentelemetry
