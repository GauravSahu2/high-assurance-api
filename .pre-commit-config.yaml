exclude: '^(node_modules|venv|\.pytest_cache|audit_reports|dist|build)/'
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.2
    hooks:
      - id: ruff
        args: [--fix, --exit-zero]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: detect-private-key
        exclude: 'tests/13_dependency_secrets/scan_hardcoded_secrets.sh'
      - id: trailing-whitespace
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '^(tests/|requirements\.txt|\.secrets\.baseline)'
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --warn-return-any, --no-strict-optional]
        files: ^src/
        additional_dependencies: [
          flask, pyjwt, werkzeug, prometheus-flask-instrumentator,
          python-json-logger, types-requests
        ]
